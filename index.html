<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ClipSnap</title>

<link rel="icon" href="favicon.png">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<div class="brand">

<img src="favicon.png" class="logo">

<div class="title">

<h1>ClipSnap</h1>
<span>by Musaiyab</span>

</div>

</div>

<div class="card">

<div class="inputBox">

<span id="platformIcon">🎬</span>

<input id="url" placeholder="Paste video link">

<button id="pasteBtn">📋</button>

</div>

<div id="loader"></div>

<video id="preview" controls></video>

<button id="downloadBtn">Download</button>

<div class="progress">
<div id="progressBar"></div>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
