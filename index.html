<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ClipSnap - Video Downloader</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<h1>ClipSnap</h1>
<p class="author">by Musaiyab</p>

<div class="inputBox">

<span id="platform">🎬</span>

<input id="url" placeholder="Paste video link">

<button id="pasteBtn">📋</button>

</div>

<button onclick="fetchVideo()">Fetch Video</button>

<!-- DOWNLOAD SECTION -->

<div id="result">

<img id="thumb">

<video id="player" controls></video>

<button id="downloadBtn">Download</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
