<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ClipSnap - Video Downloader</title>

<meta name="description" content="Download TikTok, Instagram Reels, Facebook and YouTube videos easily with ClipSnap">

<link rel="icon" href="favicon.png">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<header class="brand">

<img src="favicon.png" class="logo">

<div>
<h1>ClipSnap</h1>
<p>by Musaiyab</p>
</div>

</header>


<div class="card">

<div class="inputBox">

<span id="platformIcon">🎬</span>

<input id="url" placeholder="Paste video link">

<button id="pasteBtn">📋</button>

</div>

<div id="loader"></div>

<video id="preview" controls></video>

<button id="downloadBtn">Download Video</button>

</div>


<!-- animated platform icons -->

<div class="platforms">

<img src="https://cdn.simpleicons.org/tiktok">
<img src="https://cdn.simpleicons.org/instagram">
<img src="https://cdn.simpleicons.org/facebook">
<img src="https://cdn.simpleicons.org/youtube">

</div>


<!-- AdSense space -->

<div class="ads">
Ad space
</div>

</div>

<script src="script.js"></script>

</body>
</html>
