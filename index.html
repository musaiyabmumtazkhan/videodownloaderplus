<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ClipSnap</title>

<link rel="icon" href="favicon.png">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<div class="brand">

<img src="favicon.png" class="logo">

<h1>ClipSnap</h1>
<p>by Musaiyab</p>

</div>

<div class="card">

<div class="inputBox">

<span class="icon">🎬</span>

<input id="url" placeholder="Paste TikTok / Insta / FB / YouTube link">

<button id="pasteBtn">📋</button>

</div>

<button class="fetchBtn">Fetch Video</button>

<div class="platforms">

<img src="icons/tiktok.svg">
<img src="icons/instagram.svg">
<img src="icons/facebook.svg">
<img src="icons/youtube.svg">

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
